name: CI/CD Pipeline (main)

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26.2"

            - name: Install dependencies
              run: go mod download

            - name: Build Check
              run: go build -v ./...

            - name: Run Tests
              run: go test -v ./...

    deploy:
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26.2"
            - name: Build Go binary for Linux
              run: GOOS=linux GOARCH=amd64 go build -o main ./main.go

            - name: Copy binary to EC2
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.EC2_HOST}}
                  username: ${{ secrets.EC2_USERNAME}}
                  key: ${{secrets.EC2_KEY}}
                  source: "main"
                  target: "/home/ubuntu/welog-be"

            - name: Restart Systemd Service
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.EC2_HOST}}
                  username: ${{ secrets.EC2_USERNAME}}
                  key: ${{ secrets.EC2_KEY}}
                  script: |
                      sudo systemctl restart welog.service
